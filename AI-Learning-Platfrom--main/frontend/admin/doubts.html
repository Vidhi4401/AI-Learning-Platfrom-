<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty | Student Doubts</title>
    <link rel="stylesheet" href="css/main_fixed.css">
    <style>
        .page-content { padding-top: 10px !important; }
        .doubt-card { 
            background: white; border-radius: 12px; padding: 1.5rem; 
            margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #3b82f6;
        }
        .doubt-header { display: flex; justify-content: space-between; margin-bottom: 1rem; }
        .student-name { font-weight: bold; color: #1e40af; }
        .doubt-date { font-size: 0.85rem; color: #64748b; }
        .doubt-query { font-size: 1.1rem; margin-bottom: 1rem; color: #1e293b; }
        
        .reply-box { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #d1d5db; margin-bottom: 10px; }
        .btn-reply { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-reply:hover { background: #2563eb; }
        
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-answered { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <header class="navbar" id="navbar"></header>
            
            <div class="page-content">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                    <h1>Student Doubts</h1>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-reply" onclick="loadDoubts('pending')" style="background:#64748b;">Pending</button>
                        <button class="btn-reply" onclick="loadDoubts('all')" style="background:#94a3b8;">All History</button>
                    </div>
                </div>

                <div id="doubts-list">
                    <!-- Dynamic Doubts Load Here -->
                    <div style="text-align:center; padding:3rem; color:#64748b;">Loading doubts...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/doubts.js"></script>
</body>
</html>
