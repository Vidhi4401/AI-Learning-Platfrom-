<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quizzes</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/student-quizzes.css">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div id="navbar" class="navbar"></div>
    <div class="page-content">

      <div class="page-header">
        <h1>Quizzes</h1>
        <p>Take quizzes and test your knowledge</p>
      </div>

      <!-- Course Filter -->
      <div class="filter-section">
        <label>Filter by Course</label>
        <select id="courseFilter" onchange="filterByCourse()">
          <option value="all">All Courses</option>
        </select>
      </div>

      <!-- Summary -->
      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-icon pending">⏳</div>
          <div>
            <div class="summary-label">PENDING</div>
            <div class="summary-val" id="pendingCount">--</div>
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-icon completed">✓</div>
          <div>
            <div class="summary-label">COMPLETED</div>
            <div class="summary-val" id="completedCount">--</div>
          </div>
        </div>
      </div>

      <!-- Pending -->
      <div class="section-title">Pending Quizzes</div>
      <div class="quiz-cards-grid" id="pendingGrid">
        <div class="loading-row">Loading…</div>
      </div>

      <!-- Completed -->
      <div class="section-title" style="margin-top:36px;">Completed Quizzes</div>
      <div class="completed-list" id="completedList">
        <div class="loading-row">Loading…</div>
      </div>

    </div>
  </div>
  <script src="js/student-layout.js"></script>
  <script src="js/student-quizzes.js"></script>
</body>
</html>
