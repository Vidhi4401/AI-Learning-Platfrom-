<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Admin Portal</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <div id="sidebar" class="sidebar"></div>

  <div class="main-content">
    <div id="navbar" class="navbar"></div>

    <main class="page-content">
      
      <!-- 6 Stat Cards -->
      <div class="stats-grid fade-up">
        <div class="stat-card">
          <div class="stat-label">Total Teachers</div>
          <div class="stat-value" id="totalTeachers">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Students</div>
          <div class="stat-value" id="totalStudents">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Courses</div>
          <div class="stat-value" id="totalCourses">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Platform Avg Score</div>
          <div class="stat-value" id="avgScore">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Certificates Issued</div>
          <div class="stat-value" id="totalCerts">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active This Week</div>
          <div class="stat-value" id="activeWeek">--</div>
        </div>
      </div>

      <!-- Charts Row -->
      <div class="charts-row fade-up" style="animation-delay: 0.1s">
        <div class="chart-card">
          <div class="chart-title">Enrolled Students per Course</div>
          <div class="chart-container">
            <canvas id="courseDistChart"></canvas>
          </div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Learner Level Distribution</div>
          <div class="chart-container">
            <canvas id="levelDistChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Teacher Performance -->
      <div class="table-card fade-up" style="animation-delay: 0.2s">
        <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
          <h3 class="chart-title" style="margin:0">Teacher Impact Overview</h3>
          <a href="teachers.html" style="font-size: 13px; color: var(--accent); font-weight: 600; text-decoration: none;">View All Teachers →</a>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>Teacher Name</th>
              <th>Courses</th>
              <th>Total Students</th>
              <th>Avg Student Score</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="teacherPerfBody">
            <!-- Dynamic -->
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
