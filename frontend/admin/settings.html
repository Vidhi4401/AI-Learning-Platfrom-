<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Admin Portal</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/settings.css">
</head>
<body>

  <div id="sidebar" class="sidebar"></div>

  <div class="main-content">
    <div id="navbar" class="navbar"></div>

    <main class="page-content">
      <header class="settings-header">
        <h1>System Settings</h1>
        <p>Global configuration for platform branding and administrative security.</p>
      </header>

      <div class="settings-grid">
        
        <!-- Platform Branding -->
        <section class="settings-section">
            <h2>🏢 Platform Branding</h2>
            
            <div class="form-group">
                <label>Organization Name</label>
                <input type="text" id="orgName" class="form-input">
            </div>

            <div class="form-group">
                <label>Platform Display Name</label>
                <input type="text" id="platformName" class="form-input">
            </div>

            <div class="form-group">
                <label>Platform Logo</label>
                <div class="branding-upload">
                    <div id="logoPreview" class="logo-preview-box">
                        <span style="font-size:24px;">🖼️</span>
                    </div>
                    <div style="flex:1;">
                        <input type="file" id="logoFile" accept="image/*" style="display:none;">
                        <button class="btn btn-primary" style="padding:8px 16px; font-size:12px;" onclick="document.getElementById('logoFile').click()">Choose File</button>
                        <p style="font-size:11px; color:var(--muted); margin-top:8px;">Recommended: Square PNG or SVG (Max 2MB)</p>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="saveBranding()">Save Branding Settings</button>
        </section>

        <!-- Admin Profile -->
        <section class="settings-section">
            <h2>🔐 Administrator Profile</h2>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="adminName" class="form-input">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="adminEmail" class="form-input">
            </div>

            <div style="margin: 32px 0 24px; padding-top: 24px; border-top: 1px solid var(--border);">
                <h3 style="font-size:14px; font-weight:700; color:var(--ink); margin-bottom:16px;">Update Security Password</h3>
                
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currPass" class="form-input" placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPass" class="form-input" placeholder="••••••••">
                </div>
            </div>

            <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="saveProfile()">Update Profile & Security</button>
        </section>

      </div>
    </main>
  </div>

  <script src="js/layout.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
