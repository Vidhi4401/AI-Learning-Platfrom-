<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organization Library — LearnHub</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .course-card {
      background: #fff; border-radius: 16px; border: 1px solid var(--border); overflow: hidden;
      display: flex; flex-direction: column; transition: transform 0.2s;
    }
    .course-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .course-img { width: 100%; height: 160px; background: #f3f4f6; }
    .course-img img { width: 100%; height: 100%; object-fit: cover; }
    .course-content { padding: 20px; flex: 1; }
    .course-title { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
    .course-author { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .badge-assigned { background: #eff6ff; color: #2563eb; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  </style>
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div id="navbar" class="navbar"></div>
    <main class="page-content">
      <h1 class="navbar-page-title" style="font-size:24px; margin-bottom:24px;">Organization Course Library</h1>
      <div id="libraryGrid" class="courses-grid">
        <div style="text-align:center; padding:5rem; color:var(--muted);">Loading library...</div>
      </div>
    </main>
  </div>
  <script src="js/layout.js"></script>
  <script src="js/org-library.js"></script>
</body>
</html>
