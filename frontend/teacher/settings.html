<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/settings.css">
</head>

<body>

  <!-- Sidebar injected by JS -->
  <div id="sidebar" class="sidebar"></div>

  <div class="main-content">

    <!-- Navbar injected by JS -->
    <div id="navbar" class="navbar"></div>

    <div class="page-content">

      <div class="settings-header">
        <h1>Settings</h1>
        <p>Manage your platform settings</p>
      </div>

      <!-- Platform Information Section -->
<section class="settings-section">
  <h2>Platform Information</h2>

  <!-- Organization name — READ ONLY, just display -->
  <div class="form-group">
    <label>Organization Name <span class="readonly-badge">Read Only</span></label>
    <input type="text" class="form-input readonly" id="orgName"
           placeholder="Your organization name" disabled>
  </div>

  <!-- Platform name — EDITABLE -->
  <div class="form-group">
    <label>Platform Name <span class="hint"></span></label>
    <input type="text" class="form-input" id="platformName" placeholder="LearnHub">
  </div>

  <!-- Logo -->
  <div class="form-group">
    <label>Platform Logo</label>
    <div class="upload-box" id="uploadBox">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
      <p>Upload platform logo</p>
      <span>PNG, SVG up to 2MB</span>
      <input type="file" id="logoUpload" accept="image/*" style="display:none;">
    </div>
  </div>
</section>

      <!-- Manage Categories Section -->
      <section class="settings-section">
        <h2>Manage Categories</h2>

        <div class="categories-input">
          <input type="text" class="form-input" id="categoryInput" placeholder="Add new category">
          <button class="btn btn-primary" id="addCategoryBtn">+ Add</button>
        </div>

        <div class="categories-list" id="categoriesList">
          <!-- Categories rendered by JS -->
        </div>
      </section>

      <!-- Teacher Profile Section -->
      <section class="settings-section">
        <h2>Teacher Profile</h2>

        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-input" id="TeacherName" placeholder="Teacher User" value="Teacher User">
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="form-input" id="TeacherEmail" placeholder="Teacher@learnhub.com" value="Teacher@learnhub.com">
          </div>
        </div>

        <div class="form-group">
          <label>Change Password</label>
          <input type="password" class="form-input" id="TeacherPassword" placeholder="Enter new password">
        </div>

        <button class="btn btn-primary btn-large" id="saveChangesBtn">Save Changes</button>
      </section>

    </div>
  </div>

<script src="js/layout.js"></script>
<script src="js/settings.js"></script>

</body>

</html>
