<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnHub | Login</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: #fff;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }
    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      gap: 10px;
    }
    .logo-img {
      height: 54px;
      border-radius: 10px;
    }
    .logo-text {
      font-size: 1.7rem;
      font-weight: 800;
      color: #1e40af;
    }
    .auth-title {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 1.75rem;
    }
    .form-group { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: .35rem;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: .7rem .9rem;
      border-radius: 9px;
      border: 1.5px solid #cbd5e1;
      font-size: .97rem;
      font-family: inherit;
      color: #1e293b;
      transition: border-color .2s;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }

    /* ── Eye toggle for password fields ── */
    .pwd-wrap { position: relative; }
    .pwd-wrap input { padding-right: 42px; }
    .pwd-eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #94a3b8; font-size: 16px; padding: 0; line-height: 1;
      display: flex; align-items: center;
    }
    .pwd-eye:hover { color: #475569; }

    .btn {
      width: 100%;
      margin-top: 1rem;
      padding: .75rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { opacity: .65; cursor: not-allowed; }

    /* Error / info banners */
    .alert {
      border-radius: 8px;
      padding: .65rem 1rem;
      font-size: .88rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: none;
    }
    .alert-error { background: #fee2e2; color: #dc2626; }
    .alert-info  { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }

    /* Contact admin note */
    .contact-note {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      text-align: center;
      font-size: .84rem;
      color: #64748b;
      line-height: 1.5;
    }
    .contact-note strong { color: #1e293b; }
  </style>
</head>
<body>

  <div class="auth-card">

    <div class="logo-container">
      <img src="image.png" alt="Logo" class="logo-img"
           onerror="this.style.display='none'">
      <span class="logo-text">LearnHub</span>
    </div>

    <div class="auth-title">Sign in to your account</div>

    <div id="alertBox" class="alert alert-error"></div>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="loginEmail" placeholder="you@organization.com"
             onkeydown="if(event.key==='Enter') login()">
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="pwd-wrap">
      <input type="password" id="loginPassword" placeholder="Enter your password"
             onkeydown="if(event.key==='Enter') login()">
      <button type="button" class="pwd-eye" onclick="togglePwd(this)" tabindex="-1" aria-label="Show/hide password"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
    </div>

    <button class="btn" id="loginBtn" onclick="login()">Sign In</button>

    <div class="contact-note">
      <strong>Need access?</strong><br>
      Accounts are created by your organization's administrator.<br>
      Contact your admin to get your login credentials or to reset your password.
    </div>

  </div>

  <script>

    /* ── Eye toggle ── */
    function togglePwd(btn) {
      const input = btn.closest('.pwd-wrap').querySelector('input');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      btn.innerHTML = show
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }

    const API = "http://127.0.0.1:8000/api/v1";

    function showError(msg) {
      const el = document.getElementById("alertBox");
      el.textContent = msg;
      el.className = "alert alert-error";
      el.style.display = "block";
    }

    async function login() {
      const email = document.getElementById("loginEmail").value.trim();
      const pwd   = document.getElementById("loginPassword").value;
      const btn   = document.getElementById("loginBtn");

      if (!email || !pwd) { showError("Please enter your email and password."); return; }

      btn.disabled    = true;
      btn.textContent = "Signing in…";
      document.getElementById("alertBox").style.display = "none";

      try {
        const res  = await fetch(`${API}/auth/login`, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ email, password: pwd })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || "Invalid email or password.");
          return;
        }

        localStorage.setItem("token", data.access_token);
        localStorage.setItem("user", JSON.stringify({
          id:            data.id,
          name:          data.name,
          email:         data.email,
          role:          data.role,
          platform_name: data.platform_name,
          org_logo:      data.org_logo
        }));

        if      (data.role === "admin")   window.location.href = "admin/dashboard.html";
        else if (data.role === "teacher") window.location.href = "teacher/dashboard.html";
        else                              window.location.href = "student/student-courses.html";

      } catch (err) {
        showError("Could not connect to server. Make sure the backend is running.");
      } finally {
        btn.disabled    = false;
        btn.textContent = "Sign In";
      }
    }
  </script>

</body>
</html>
