<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assignments</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/student-assignments.css">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main-content">
    <div id="navbar" class="navbar"></div>
    <div class="page-content">

      <div class="page-header">
        <h1>Assignments</h1>
        <p>Manage and submit your course assignments</p>
      </div>

      <!-- Course Filter -->
      <div class="filter-section">
        <label>Filter by Course</label>
        <select id="courseFilter" onchange="filterByCourse()">
          <option value="all">All Courses</option>
        </select>
      </div>

      <!-- Summary Cards -->
      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-icon pending">⏳</div>
          <div>
            <div class="summary-label">PENDING</div>
            <div class="summary-val" id="pendingCount">--</div>
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-icon graded">✓</div>
          <div>
            <div class="summary-label">completed</div>
            <div class="summary-val" id="gradedCount">--</div>
          </div>
        </div>
      </div>

      <!-- Pending -->
      <div class="section-title">Pending Assignments</div>
      <div class="assign-list" id="pendingList">
        <div class="loading-row">Loading assignments…</div>
      </div>

      <!-- Completed -->
      <div class="section-title" style="margin-top:36px;">Completed Assignments</div>
      <div class="assign-list" id="completedList">
        <div class="loading-row">Loading assignments…</div>
      </div>

    </div>
  </div>
  <script src="js/student-layout.js"></script>
  <script src="js/student-assignments.js"></script>
</body>
</html>
