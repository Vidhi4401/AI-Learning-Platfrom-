<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Materials — LearnHub</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/student-assignments.css">
  <style>
    .material-card {
      background: #fff;
      padding: 1.25rem 1.5rem;
      border-radius: 12px;
      border: 1px solid #f1f5f9;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .material-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }
    .mat-icon { font-size: 28px; margin-right: 14px; flex-shrink: 0; }
    .mat-info { flex: 1; }
    .mat-title {
      font-weight: 700;
      font-size: 15px;
      color: #1e293b;
      margin-bottom: 4px;
    }
    .mat-course {
      display: inline-block;
      font-size: 12px;
      color: #64748b;
      background: #f1f5f9;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    .mat-view-btn {
      background: var(--accent, #7c3aed);
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .mat-view-btn:hover { opacity: 0.88; }
    .loading-row, .empty-row {
      text-align: center;
      padding: 3rem;
      color: #64748b;
      background: #fff;
      border-radius: 12px;
      border: 2px dashed #e2e8f0;
    }
    .empty-row h3 { margin: 0 0 8px; font-size: 16px; color: #334155; }
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-bar label { font-size: 13px; font-weight: 600; color: var(--muted); }
    .filter-bar select {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      font-family: inherit;
      font-size: 13px;
      color: var(--ink);
      outline: none;
      min-width: 220px;
    }
  </style>
</head>
<body>

  <div id="sidebar" class="sidebar"></div>

  <div class="main-content">
    <div id="navbar" class="navbar"></div>

    <main class="page-content">
      <section class="page-header">
        <h1>Study Materials</h1>
        <p>Notes and resources uploaded by your teachers.</p>
      </section>

      <div class="filter-bar">
        <label>Filter by Course:</label>
        <select id="courseFilter" onchange="filterMaterials()">
          <option value="all">All Enrolled Courses</option>
        </select>
      </div>

      <div id="materialsList">
        <div class="loading-row">Fetching your notes…</div>
      </div>
    </main>
  </div>

  <script src="js/student-layout.js"></script>
  <script>
    const API          = "http://127.0.0.1:8000/api/v1";
    // token is declared by student-layout.js
    let cachedMaterials   = [];
    let enrolledCourses   = [];

    window.addEventListener("load", () => setTimeout(init, 100));

    async function init() {
      if (!token) { window.location.href = "../auth.html"; return; }
      await loadEnrolledCourses();
      await fetchAllMaterials();
    }

    async function loadEnrolledCourses() {
      try {
        const [coursesRes, enrollRes] = await Promise.all([
          fetch(`${API}/student/courses`,     { headers: { Authorization: "Bearer " + token } }),
          fetch(`${API}/student/enrollments`, { headers: { Authorization: "Bearer " + token } })
        ]);
        const allCourses  = await coursesRes.json();
        const enrollments = await enrollRes.json();
        const enrolledIds = new Set(enrollments.map(e => e.course_id));
        enrolledCourses   = allCourses.filter(c => enrolledIds.has(c.id));

        const sel = document.getElementById("courseFilter");
        sel.innerHTML = '<option value="all">All Enrolled Courses</option>';
        enrolledCourses.forEach(c => {
          const opt = document.createElement("option");
          opt.value      = c.id;
          opt.textContent = c.title;
          sel.appendChild(opt);
        });
      } catch(e) { console.error("Courses load error", e); }
    }

    async function fetchAllMaterials() {
      const container = document.getElementById("materialsList");
      try {
        if (!enrolledCourses.length) {
          container.innerHTML = '<div class="empty-row"><h3>Not enrolled yet</h3><p>Enroll in a course to access its materials.</p></div>';
          return;
        }
        const results = await Promise.all(
          enrolledCourses.map(async c => {
            try {
              const r    = await fetch(`${API}/materials/course/${c.id}`,
                                      { headers: { Authorization: "Bearer " + token } });
              if (!r.ok) return [];
              const mats = await r.json();
              return mats.map(m => ({ ...m, courseName: c.title }));
            } catch { return []; }
          })
        );
        cachedMaterials = results.flat();
        renderMaterials(cachedMaterials);
      } catch(e) {
        container.innerHTML = '<div class="empty-row">Could not connect to server.</div>';
      }
    }

    function renderMaterials(list) {
      const container = document.getElementById("materialsList");
      const filterVal = document.getElementById("courseFilter").value;

      if (!list || !list.length) {
        if (filterVal !== "all") {
          container.innerHTML = `
            <div class="empty-row">
              <h3>📚 No Materials Yet</h3>
              <p>Your teacher hasn't uploaded materials for this course yet. Check back later!</p>
            </div>`;
        } else {
          container.innerHTML = `
            <div class="empty-row">
              <h3>📚 No Materials Yet</h3>
              <p>Your teachers haven't uploaded any study materials yet.</p>
            </div>`;
        }
        return;
      }

      container.innerHTML = list.map(m => `
        <div class="material-card">
          <div style="display:flex; align-items:center;">
            <div class="mat-icon">${getFileIcon(m.file_url)}</div>
            <div class="mat-info">
              <div class="mat-title">${m.title}</div>
              <span class="mat-course">${m.courseName}</span>
            </div>
          </div>
          <a href="${getFileUrl(m.file_url)}" target="_blank" class="mat-view-btn">⬇ Open</a>
        </div>
      `).join("");
    }

    function filterMaterials() {
      const val = document.getElementById("courseFilter").value;
      const filtered = val === "all"
        ? cachedMaterials
        : cachedMaterials.filter(m => String(m.course_id) === String(val));
      renderMaterials(filtered);
    }

    function getFileIcon(url) {
      if (!url) return "📄";
      const lower = url.toLowerCase();
      if (lower.includes(".pdf"))                          return "📕";
      if (lower.includes(".doc"))                          return "📝";
      if (lower.includes(".ppt"))                          return "📊";
      if (lower.includes(".xls"))                          return "📈";
      return "📄";
    }
  </script>
</body>
</html>
